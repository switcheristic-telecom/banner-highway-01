<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banner Highway Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      height: 44px;
    }

    #toolbar button {
      padding: 6px 14px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    #toolbar button:hover { background: #2a2a2a; color: #fff; }
    #toolbar button.primary { background: #03a062; color: #fff; border-color: #04b872; }
    #toolbar button.primary:hover { background: #04b872; }
    #toolbar button.danger { border-color: #a03030; }
    #toolbar button.danger:hover { background: #a03030; color: #fff; }
    #toolbar label { font-size: 11px; color: #888; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #toolbar input[type="checkbox"] { cursor: pointer; }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: #666;
    }

    /* Main layout */
    #main {
      display: flex;
      height: calc(100vh - 44px);
    }

    /* Canvas area */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    /* Sidebar */
    #sidebar {
      width: 280px;
      background: #111;
      border-left: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 12px;
    }

    #sidebar h3 {
      font-size: 13px;
      color: #03a062;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }

    /* Node info */
    #node-info { display: none; }
    #node-info.active { display: block; }
    #node-info label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
      margin-top: 8px;
    }
    #node-info input {
      width: 100%;
      padding: 4px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #ddd;
      font-family: inherit;
      font-size: 12px;
    }
    .coord-row {
      display: flex;
      gap: 6px;
    }
    .coord-row > div { flex: 1; }
    .readonly-field {
      padding: 4px 8px;
      background: #151515;
      border: 1px solid #222;
      border-radius: 3px;
      color: #999;
      font-size: 11px;
      font-family: inherit;
    }

    /* Banner list */
    .banner-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 4px;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .banner-item:hover { border-color: #444; }
    .banner-item.selected { border-color: #03a062; background: #0d1f17; }
    .banner-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .banner-item .banner-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .banner-item .banner-t { color: #666; font-size: 10px; }

    /* Floating banner tooltip */
    #banner-tooltip {
      display: none;
      position: absolute;
      z-index: 10;
      background: #141414;
      border: 1px solid #03a062;
      border-radius: 6px;
      padding: 10px 12px;
      width: 240px;
      pointer-events: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #banner-tooltip.active { display: block; }
    #banner-tooltip::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 20px;
      width: 10px;
      height: 10px;
      background: #141414;
      border-left: 1px solid #03a062;
      border-top: 1px solid #03a062;
      transform: rotate(45deg);
    }
    #banner-tooltip h4 {
      font-size: 11px;
      color: #03a062;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #banner-tooltip label {
      display: block;
      font-size: 10px;
      color: #888;
      margin-bottom: 1px;
      margin-top: 6px;
    }
    #banner-tooltip input, #banner-tooltip select {
      width: 100%;
      padding: 3px 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #ddd;
      font-family: inherit;
      font-size: 11px;
    }
    .tt-row {
      display: flex;
      gap: 4px;
    }
    .tt-row > div { flex: 1; }
    #banner-tooltip .tt-btn-row {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    #banner-tooltip .tt-btn-row button {
      flex: 1;
      padding: 4px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
    }
    #banner-tooltip .tt-btn-row button.save { background: #03a062; color: #fff; border-color: #04b872; }
    #banner-tooltip .tt-btn-row button.del { border-color: #a03030; }
    #banner-tooltip .tt-btn-row button.del:hover { background: #a03030; color: #fff; }

    /* Canvas overlay info */
    #canvas-info {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: #555;
      pointer-events: none;
    }

    /* Asset library panel */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .asset-thumb {
      position: relative;
      border: 2px solid #222;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1;
      background: #1a1a1a;
    }
    .asset-thumb:hover { border-color: #444; }
    .asset-thumb.selected { border-color: #03a062; box-shadow: 0 0 6px rgba(3,160,98,0.3); }
    .asset-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .asset-thumb .asset-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      font-size: 9px;
      padding: 2px 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
    }
    .asset-thumb .asset-del {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: rgba(160,48,48,0.8);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      display: none;
    }
    .asset-thumb:hover .asset-del { display: block; }

    #asset-upload-btn {
      display: block;
      width: 100%;
      padding: 6px;
      margin-top: 8px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px dashed #444;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      text-align: center;
    }
    #asset-upload-btn:hover { border-color: #03a062; color: #fff; }

    /* Asset picker in tooltip */
    .tt-asset-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .tt-asset-preview {
      width: 36px;
      height: 36px;
      border-radius: 3px;
      border: 1px solid #333;
      background: #1a1a1a;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tt-asset-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tt-asset-name {
      flex: 1;
      font-size: 10px;
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tt-asset-name.empty { color: #666; font-style: italic; }
    .tt-asset-btns {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .tt-asset-btns button {
      padding: 2px 6px;
      font-size: 9px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
    }
    .tt-asset-btns button:hover { background: #2a2a2a; color: #fff; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button class="primary" id="btn-save">Save All</button>
    <button id="btn-add-node">+ Waypoint</button>
    <button class="danger" id="btn-delete-node">Delete Waypoint</button>
    <span>|</span>
    <button id="btn-fit">Fit View</button>
    <button id="btn-add-banner">+ Banner</button>
    <label><input type="checkbox" id="chk-cyclic" /> Cyclic</label>
    <span id="status">Loading...</span>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="canvas-info"></div>

      <!-- Floating banner edit tooltip -->
      <div id="banner-tooltip">
        <h4 id="tt-title">Banner</h4>
        <label>Position (t)</label>
        <input type="number" id="tt-t" step="0.01" min="0" max="1" />
        <div class="tt-row">
          <div>
            <label>Mirror</label>
            <input type="checkbox" id="tt-mirror" />
          </div>
          <div>
            <label>Angle</label>
            <input type="number" id="tt-angle" step="1" />
          </div>
        </div>
        <div class="tt-row">
          <div><label>Size</label><input type="number" id="tt-size" step="0.1" /></div>
          <div><label>Distance</label><input type="number" id="tt-dist" step="0.1" /></div>
        </div>
        <div class="tt-row">
          <div><label>Elevation</label><input type="number" id="tt-elev" step="0.1" /></div>
          <div><label>Emissive</label><input type="number" id="tt-emissive" step="0.1" /></div>
        </div>
        <label>Asset</label>
        <div class="tt-asset-picker">
          <div class="tt-asset-preview" id="tt-asset-preview"></div>
          <span class="tt-asset-name empty" id="tt-asset-name">No asset</span>
          <div class="tt-asset-btns">
            <button id="tt-asset-pick" title="Pick from library">Pick</button>
            <button id="tt-asset-clear" title="Clear assignment">X</button>
          </div>
        </div>
        <div class="tt-btn-row">
          <button class="save" id="tt-save">Save</button>
          <button class="del" id="tt-delete">Delete</button>
        </div>
      </div>
    </div>

    <div id="sidebar">
      <!-- Node info panel -->
      <div class="panel" id="node-info">
        <h3>Selected Waypoint</h3>
        <label>Position</label>
        <div class="coord-row">
          <div><input type="number" id="node-px" step="1" placeholder="x" /></div>
          <div><input type="number" id="node-pz" step="1" placeholder="z" /></div>
        </div>
        <label>Heading (computed)</label>
        <div class="readonly-field" id="node-heading">--</div>
        <label>Curvature (computed)</label>
        <div class="readonly-field" id="node-curvature">--</div>
      </div>

      <!-- Banner list panel -->
      <div class="panel">
        <h3>Banners</h3>
        <div id="banner-list"></div>
      </div>

      <!-- Asset library panel -->
      <div class="panel">
        <h3>Assets</h3>
        <div class="asset-grid" id="asset-grid"></div>
        <button id="asset-upload-btn">+ Upload Image</button>
        <input type="file" id="asset-upload-input" accept="image/*" style="display:none" />
      </div>
    </div>
  </div>

<script type="module">
// ===========================================================================
// API Client
// ===========================================================================
const API = {
  async getBranches() { return (await fetch('/api/branches')).json(); },
  async getBranch(id) { return (await fetch(`/api/branches/${id}`)).json(); },
  async updateBranch(id, data) {
    return (await fetch(`/api/branches/${id}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })).json();
  },
  async getBanners() { return (await fetch('/api/banners')).json(); },
  async updateBanner(id, data) {
    return (await fetch(`/api/banners/${id}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })).json();
  },
  async createBanner(data) {
    return (await fetch('/api/banners', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })).json();
  },
  async deleteBanner(id) {
    return (await fetch(`/api/banners/${id}`, { method: 'DELETE' })).json();
  },
  async getAssets() { return (await fetch('/api/assets')).json(); },
  async uploadAsset(file, name) {
    const fd = new FormData();
    fd.append('file', file);
    if (name) fd.append('name', name);
    return (await fetch('/api/assets', { method: 'POST', body: fd })).json();
  },
  async deleteAsset(id) {
    return (await fetch(`/api/assets/${id}`, { method: 'DELETE' })).json();
  },
};

// ===========================================================================
// Periodic Cubic Spline (editor-side, mirrors PeriodicSplineSolver.ts)
// ===========================================================================

function solveTridiag(a, b, c, d) {
  const N = b.length;
  const cp = new Array(N), dp = new Array(N), x = new Array(N);
  cp[0] = c[0] / b[0]; dp[0] = d[0] / b[0];
  for (let i = 1; i < N; i++) {
    const m = a[i] / (b[i] - a[i] * cp[i - 1]);
    cp[i] = c[i] ? c[i] / (b[i] - a[i] * cp[i - 1]) : 0;
    dp[i] = (d[i] - a[i] * dp[i - 1]) / (b[i] - a[i] * cp[i - 1]);
  }
  x[N - 1] = dp[N - 1];
  for (let i = N - 2; i >= 0; i--) x[i] = dp[i] - cp[i] * x[i + 1];
  return x;
}

function solveCyclicTridiag(a, b, c, d) {
  const N = a.length;
  if (N === 1) return [d[0] / b[0]];
  const gamma = -b[0];
  const bb = [...b]; bb[0] -= gamma; bb[N-1] -= a[0]*c[N-1]/gamma;
  const y = solveTridiag(a, bb, c, d);
  const u = new Array(N).fill(0); u[0] = gamma; u[N-1] = c[N-1];
  const z = solveTridiag(a, bb, c, u);
  const factor = (y[0]+a[0]*y[N-1]/gamma)/(1+z[0]+a[0]*z[N-1]/gamma);
  return y.map((yi,i) => yi - factor * z[i]);
}

function computeSplineDerivsPeriodic(vals, h) {
  const N = vals.length;
  const delta = new Array(N);
  for (let i = 0; i < N; i++) delta[i] = (vals[(i+1)%N] - vals[i]) / h[i];
  const a = [], b = [], c = [], rhs = [];
  for (let i = 0; i < N; i++) {
    const im = (i-1+N)%N;
    a.push(h[im]); b.push(2*(h[im]+h[i])); c.push(h[i]);
    rhs.push(3*(h[im]*delta[i]+h[i]*delta[im]));
  }
  return solveCyclicTridiag(a, b, c, rhs);
}

function computeSplineDerivsOpen(vals, h) {
  const N = vals.length, M = N-1;
  const delta = new Array(M);
  for (let i = 0; i < M; i++) delta[i] = (vals[i+1]-vals[i])/h[i];
  if (N === 2) return [delta[0], delta[0]];
  const a = new Array(N), bb = new Array(N), c = new Array(N), rhs = new Array(N);
  bb[0]=2; c[0]=1; rhs[0]=3*delta[0]; a[0]=0;
  for (let i = 1; i < N-1; i++) {
    a[i]=h[i]; bb[i]=2*(h[i-1]+h[i]); c[i]=h[i-1];
    rhs[i]=3*(h[i]*delta[i-1]+h[i-1]*delta[i]);
  }
  a[N-1]=1; bb[N-1]=2; c[N-1]=0; rhs[N-1]=3*delta[M-1];
  return solveTridiag(a, bb, c, rhs);
}

// Cache for solved spline data
let splineCache = null;

function solveSpline(waypoints, isCyclic) {
  const N = waypoints.length;
  if (N < 2) { splineCache = null; return; }

  const h = [];
  const segCount = isCyclic ? N : N - 1;
  for (let i = 0; i < segCount; i++) {
    const j = (i + 1) % N;
    const dx = waypoints[j].x - waypoints[i].x;
    const dz = waypoints[j].z - waypoints[i].z;
    h.push(Math.max(Math.sqrt(dx*dx+dz*dz), 1e-10));
  }

  const xs = waypoints.map(w => w.x);
  const zs = waypoints.map(w => w.z);

  let dxdt, dzdt;
  if (isCyclic) {
    dxdt = computeSplineDerivsPeriodic(xs, h);
    dzdt = computeSplineDerivsPeriodic(zs, h);
  } else {
    dxdt = computeSplineDerivsOpen(xs, h);
    dzdt = computeSplineDerivsOpen(zs, h);
  }

  const headings = [];
  for (let i = 0; i < N; i++) {
    headings.push(Math.atan2(dzdt[i], dxdt[i]));
  }

  splineCache = { waypoints, isCyclic, h, dxdt, dzdt, headings, segCount };
  buildArcLengthTable();
}

function buildArcLengthTable(numSamples = 1600) {
  if (!splineCache) return;
  const samples = [];
  let cumLen = 0;
  for (let i = 0; i <= numSamples; i++) {
    const t = i / numSamples;
    const p = evalSplineRaw(t);
    if (!p) continue;
    if (samples.length > 0) {
      const prev = samples[samples.length - 1];
      cumLen += Math.sqrt((p.x - prev.x) ** 2 + (p.z - prev.z) ** 2);
    }
    samples.push({ x: p.x, z: p.z, tx: p.tx, tz: p.tz, cumLen });
  }
  splineCache.arcSamples = samples;
  splineCache.totalLength = cumLen;
}

// Evaluate spline using Hermite basis at global t in [0,1] (segment-based, raw)
function evalSplineRaw(globalT) {
  if (!splineCache || splineCache.waypoints.length < 2) return null;
  const { waypoints, isCyclic, h, dxdt, dzdt, segCount } = splineCache;
  const N = waypoints.length;

  if (isCyclic) globalT = ((globalT % 1) + 1) % 1;
  else globalT = Math.max(0, Math.min(1, globalT));

  const segFloat = globalT * segCount;
  const seg = Math.min(Math.floor(segFloat), segCount - 1);
  const localT = segFloat - seg;

  const i0 = seg;
  const i1 = (seg + 1) % N;

  const p0x = waypoints[i0].x, p0z = waypoints[i0].z;
  const p1x = waypoints[i1].x, p1z = waypoints[i1].z;
  const m0x = dxdt[i0] * h[seg], m0z = dzdt[i0] * h[seg];
  const m1x = dxdt[i1] * h[seg], m1z = dzdt[i1] * h[seg];

  const t2 = localT * localT, t3 = t2 * localT;
  const h00 = 2*t3 - 3*t2 + 1;
  const h10 = t3 - 2*t2 + localT;
  const h01 = -2*t3 + 3*t2;
  const h11 = t3 - t2;

  const x = h00*p0x + h10*m0x + h01*p1x + h11*m1x;
  const z = h00*p0z + h10*m0z + h01*p1z + h11*m1z;

  // Tangent (derivative of Hermite)
  const dh00 = 6*t2 - 6*localT;
  const dh10 = 3*t2 - 4*localT + 1;
  const dh01 = -6*t2 + 6*localT;
  const dh11 = 3*t2 - 2*localT;

  const tx = dh00*p0x + dh10*m0x + dh01*p1x + dh11*m1x;
  const tz = dh00*p0z + dh10*m0z + dh01*p1z + dh11*m1z;

  return { x, z, tx, tz };
}

// Arc-length-based evalSpline (matches 3D HighwaySpline.sampleAtT)
function evalSpline(globalT) {
  if (!splineCache?.arcSamples) return null;
  const { arcSamples, totalLength, isCyclic } = splineCache;
  if (isCyclic) globalT = ((globalT % 1) + 1) % 1;
  else globalT = Math.max(0, Math.min(1, globalT));

  const targetLen = globalT * totalLength;
  let lo = 0, hi = arcSamples.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (arcSamples[mid].cumLen <= targetLen) lo = mid;
    else hi = mid;
  }
  const s0 = arcSamples[lo], s1 = arcSamples[hi];
  const segLen = s1.cumLen - s0.cumLen;
  if (segLen < 1e-12) return { x: s0.x, z: s0.z, tx: s0.tx, tz: s0.tz };
  const alpha = (targetLen - s0.cumLen) / segLen;
  return {
    x: s0.x + alpha * (s1.x - s0.x),
    z: s0.z + alpha * (s1.z - s0.z),
    tx: s0.tx + alpha * (s1.tx - s0.tx),
    tz: s0.tz + alpha * (s1.tz - s0.tz),
  };
}

function samplePath(waypoints, isCyclic, numSamples) {
  solveSpline(waypoints, isCyclic);
  if (!splineCache) return [];
  const pts = [];
  for (let i = 0; i <= numSamples; i++) {
    const t = i / numSamples;
    const p = evalSpline(t);
    if (p) pts.push(p);
  }
  return pts;
}

function closestTOnPath(waypoints, isCyclic, wx, wz, samples) {
  if (!splineCache) solveSpline(waypoints, isCyclic);
  if (!splineCache?.arcSamples) return { t: 0, dist: Infinity };
  let best = { t: 0, dist: Infinity };
  for (let i = 0; i <= samples; i++) {
    const t = i / samples;
    const p = evalSpline(t);
    if (!p) continue;
    const dx = p.x - wx, dz = p.z - wz;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < best.dist) best = { t, dist: d };
  }
  return best;
}

// Banner constants (must match BANNER_DEFAULT_OPTIONS in constants/defaults.ts)
const DEFAULT_DISTANCE = 10;
const DEFAULT_SIZE = 1.7;
const DEFAULT_ASPECT = 7.8;

function getBannerGeometry(banner, waypoints, isCyclic) {
  if (!splineCache) solveSpline(waypoints, isCyclic);
  const pt = evalSpline(banner.t);
  if (!pt) return null;

  const tLen = Math.sqrt(pt.tx*pt.tx + pt.tz*pt.tz) || 1;
  const tx = pt.tx/tLen, tz = pt.tz/tLen;
  const nx = -tz, nz = tx;

  const dist = (banner.distanceFactor ?? 1) * DEFAULT_DISTANCE;
  const side = Math.sign(dist) || 1;

  const pivotX = pt.x + nx * dist;
  const pivotZ = pt.z + nz * dist;

  const angleRad = ((banner.angle || 0) * Math.PI) / 180;
  const baseDir = { x: tz * side, z: -tx * side };
  const cosA = Math.cos(angleRad), sinA = Math.sin(angleRad);
  const signDirX = baseDir.x * cosA - baseDir.z * sinA;
  const signDirZ = baseDir.x * sinA + baseDir.z * cosA;

  const bannerSize = (banner.sizeFactor ?? 1) * DEFAULT_SIZE;
  const signLen = (bannerSize * DEFAULT_ASPECT) / 2;
  const signEndX = pivotX + signDirX * signLen;
  const signEndZ = pivotZ + signDirZ * signLen;

  return {
    roadPt: pt,
    pivotX, pivotZ,
    signEndX, signEndZ,
    tx, tz, nx, nz, side,
  };
}

// ===========================================================================
// State
// ===========================================================================
let branches = [];
let banners = [];
let assets = [];
let activeBranchIdx = 0;
let selectedNodeIdx = -1;
let selectedBannerId = null;
let pickingAssetForBanner = null;
let dragTarget = null;
let addingNode = false;

// Viewport
const vp = { cx: 228, cz: 530, scale: 3, dragging: false, lastX: 0, lastY: 0 };

// ===========================================================================
// Canvas Setup
// ===========================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  render();
}
window.addEventListener('resize', resizeCanvas);

function w2s(wx, wz) {
  const cw = canvas.width / devicePixelRatio;
  const ch = canvas.height / devicePixelRatio;
  return {
    x: (wx - vp.cx) * vp.scale + cw / 2,
    y: (wz - vp.cz) * vp.scale + ch / 2,
  };
}
function s2w(sx, sy) {
  const cw = canvas.width / devicePixelRatio;
  const ch = canvas.height / devicePixelRatio;
  return {
    x: (sx - cw / 2) / vp.scale + vp.cx,
    z: (sy - ch / 2) / vp.scale + vp.cz,
  };
}

// ===========================================================================
// Rendering
// ===========================================================================
function render() {
  const cw = canvas.width / devicePixelRatio;
  const ch = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, cw, ch);

  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, cw, ch);
  drawGrid(cw, ch);

  const branch = branches[activeBranchIdx];
  if (!branch || !branch.waypoints || !branch.waypoints.length) return;
  const waypoints = branch.waypoints;
  const isCyclic = branch.isCyclic;

  // Solve spline & draw curve
  const pts = samplePath(waypoints, isCyclic, 400);
  if (pts.length > 1) {
    ctx.beginPath();
    const s0 = w2s(pts[0].x, pts[0].z);
    ctx.moveTo(s0.x, s0.y);
    for (let i = 1; i < pts.length; i++) {
      const si = w2s(pts[i].x, pts[i].z);
      ctx.lineTo(si.x, si.y);
    }
    if (isCyclic) ctx.closePath();
    ctx.strokeStyle = '#03a062';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Draw banners
  for (const b of banners) {
    if (b.branch_id !== branch.id) continue;
    const geo = getBannerGeometry(b, waypoints, isCyclic);
    if (!geo) continue;
    const isSelected = b.id === selectedBannerId;

    const sRoad = w2s(geo.roadPt.x, geo.roadPt.z);
    const sPivot = w2s(geo.pivotX, geo.pivotZ);
    const sSignEnd = w2s(geo.signEndX, geo.signEndZ);

    ctx.beginPath();
    ctx.setLineDash([4, 3]);
    ctx.moveTo(sRoad.x, sRoad.y);
    ctx.lineTo(sPivot.x, sPivot.y);
    ctx.strokeStyle = isSelected ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.moveTo(sPivot.x, sPivot.y);
    ctx.lineTo(sSignEnd.x, sSignEnd.y);
    ctx.strokeStyle = isSelected ? '#fff' : ((b.distanceFactor ?? 1) >= 0 ? '#e06020' : '#2060e0');
    ctx.lineWidth = isSelected ? 3.5 : 2.5;
    ctx.stroke();

    if (isSelected) {
      // Drag handle: larger pivot with crosshair
      ctx.beginPath();
      ctx.arc(sPivot.x, sPivot.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(sPivot.x, sPivot.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Crosshair inside drag handle
      ctx.beginPath();
      ctx.moveTo(sPivot.x - 5, sPivot.y);
      ctx.lineTo(sPivot.x + 5, sPivot.y);
      ctx.moveTo(sPivot.x, sPivot.y - 5);
      ctx.lineTo(sPivot.x, sPivot.y + 5);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Rotate handle at sign end
      ctx.beginPath();
      ctx.arc(sSignEnd.x, sSignEnd.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,180,0,0.2)';
      ctx.fill();
      ctx.strokeStyle = '#ffb400';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Curved arrow arc near rotate handle
      const arcRadius = 10;
      const dirX = sSignEnd.x - sPivot.x;
      const dirY = sSignEnd.y - sPivot.y;
      const baseAngle = Math.atan2(dirY, dirX);
      ctx.beginPath();
      ctx.arc(sSignEnd.x, sSignEnd.y, arcRadius, baseAngle + 0.5, baseAngle + 2.2);
      ctx.strokeStyle = 'rgba(255,180,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Arrowhead on arc
      const tipAngle = baseAngle + 2.2;
      const tipX = sSignEnd.x + Math.cos(tipAngle) * arcRadius;
      const tipY = sSignEnd.y + Math.sin(tipAngle) * arcRadius;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - 4 * Math.cos(tipAngle - 0.8), tipY - 4 * Math.sin(tipAngle - 0.8));
      ctx.lineTo(tipX - 4 * Math.cos(tipAngle + 0.4), tipY - 4 * Math.sin(tipAngle + 0.4));
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,180,0,0.5)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(sPivot.x, sPivot.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = (b.distanceFactor ?? 1) >= 0 ? '#e06020' : '#2060e0';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(sRoad.x, sRoad.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }

  // Draw waypoints with heading arrows
  const ARROW_LEN = 15; // screen pixels
  for (let i = 0; i < waypoints.length; i++) {
    const wp = waypoints[i];
    const sp = w2s(wp.x, wp.z);
    const isSelected = i === selectedNodeIdx;

    // Heading arrow
    if (splineCache && splineCache.headings[i] !== undefined) {
      const h = splineCache.headings[i];
      const ax = sp.x + Math.cos(h) * ARROW_LEN;
      const ay = sp.y + Math.sin(h) * ARROW_LEN;

      ctx.beginPath();
      ctx.moveTo(sp.x, sp.y);
      ctx.lineTo(ax, ay);
      ctx.strokeStyle = isSelected ? '#ffcc00' : '#555';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.stroke();

      // Arrowhead
      const aSize = 4;
      const angle = h;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - aSize * Math.cos(angle - 0.5), ay - aSize * Math.sin(angle - 0.5));
      ctx.lineTo(ax - aSize * Math.cos(angle + 0.5), ay - aSize * Math.sin(angle + 0.5));
      ctx.closePath();
      ctx.fillStyle = isSelected ? '#ffcc00' : '#555';
      ctx.fill();
    }

    // Waypoint dot
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#ffcc00' : '#03a062';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText(`${i}`, sp.x + 10, sp.y - 10);
  }

  document.getElementById('canvas-info').textContent =
    `zoom: ${vp.scale.toFixed(1)}x | waypoints: ${waypoints.length} | banners: ${banners.filter(b => b.branch_id === branch.id).length} | ${isCyclic ? 'cyclic' : 'open'}`;

  positionTooltip();
}

function drawGrid(cw, ch) {
  let gridSize = 10;
  if (vp.scale < 1) gridSize = 100;
  else if (vp.scale < 3) gridSize = 50;
  else if (vp.scale < 8) gridSize = 20;

  const tl = s2w(0, 0);
  const br = s2w(cw, ch);

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;

  const startX = Math.floor(tl.x / gridSize) * gridSize;
  const startZ = Math.floor(tl.z / gridSize) * gridSize;

  for (let x = startX; x <= br.x; x += gridSize) {
    const s = w2s(x, 0);
    ctx.beginPath(); ctx.moveTo(s.x, 0); ctx.lineTo(s.x, ch); ctx.stroke();
  }
  for (let z = startZ; z <= br.z; z += gridSize) {
    const s = w2s(0, z);
    ctx.beginPath(); ctx.moveTo(0, s.y); ctx.lineTo(cw, s.y); ctx.stroke();
  }
}

// ===========================================================================
// Tooltip positioning
// ===========================================================================
function positionTooltip() {
  const tooltip = document.getElementById('banner-tooltip');
  if (!selectedBannerId) { tooltip.classList.remove('active'); return; }

  const banner = banners.find(b => b.id === selectedBannerId);
  const branch = branches[activeBranchIdx];
  if (!banner || !branch) { tooltip.classList.remove('active'); return; }

  tooltip.classList.add('active');

  const geo = getBannerGeometry(banner, branch.waypoints, branch.isCyclic);
  if (!geo) { tooltip.classList.remove('active'); return; }
  const sPivot = w2s(geo.pivotX, geo.pivotZ);

  const wrap = document.getElementById('canvas-wrap');
  const wrapRect = wrap.getBoundingClientRect();

  let left = sPivot.x + 15;
  let top = sPivot.y + 15;

  const ttWidth = 240;
  const ttHeight = tooltip.offsetHeight || 280;
  if (left + ttWidth > wrapRect.width - 10) left = sPivot.x - ttWidth - 15;
  if (top + ttHeight > wrapRect.height - 10) top = sPivot.y - ttHeight - 15;
  if (left < 10) left = 10;
  if (top < 10) top = 10;

  tooltip.style.left = `${left}px`;
  tooltip.style.top = `${top}px`;
}

// ===========================================================================
// Hit Testing
// ===========================================================================
function hitTest(sx, sy) {
  const branch = branches[activeBranchIdx];
  if (!branch) return null;

  const hitRadius = 10;

  // Test handles on selected banner first (highest priority)
  if (selectedBannerId) {
    const selBanner = banners.find(b => b.id === selectedBannerId);
    if (selBanner && selBanner.branch_id === branch.id) {
      const geo = getBannerGeometry(selBanner, branch.waypoints, branch.isCyclic);
      if (geo) {
        const sEnd = w2s(geo.signEndX, geo.signEndZ);
        if (Math.hypot(sEnd.x - sx, sEnd.y - sy) < hitRadius) {
          return { type: 'banner-rotate', bannerId: selBanner.id };
        }
        const sPivot = w2s(geo.pivotX, geo.pivotZ);
        if (Math.hypot(sPivot.x - sx, sPivot.y - sy) < hitRadius) {
          return { type: 'banner-drag', bannerId: selBanner.id };
        }
      }
    }
  }

  // Test banner pivots
  for (const b of banners) {
    if (b.branch_id !== branch.id) continue;
    const geo = getBannerGeometry(b, branch.waypoints, branch.isCyclic);
    if (!geo) continue;
    const sp = w2s(geo.pivotX, geo.pivotZ);
    if (Math.hypot(sp.x - sx, sp.y - sy) < hitRadius) {
      return { type: 'banner', bannerId: b.id };
    }
  }

  // Test waypoints
  for (let i = 0; i < branch.waypoints.length; i++) {
    const wp = branch.waypoints[i];
    const sp = w2s(wp.x, wp.z);
    if (Math.hypot(sp.x - sx, sp.y - sy) < hitRadius) {
      return { type: 'waypoint', nodeIdx: i };
    }
  }

  return null;
}

// ===========================================================================
// Interaction
// ===========================================================================
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (e.button === 1 || e.button === 2 || (e.button === 0 && e.altKey)) {
    e.preventDefault();
    vp.dragging = true;
    vp.lastX = e.clientX;
    vp.lastY = e.clientY;
    canvas.style.cursor = 'grabbing';
    return;
  }

  if (e.button !== 0) return;

  if (addingNode) {
    const w = s2w(sx, sy);
    insertWaypointNearCursor(w.x, w.z);
    addingNode = false;
    document.getElementById('btn-add-node').textContent = '+ Waypoint';
    canvas.style.cursor = 'crosshair';
    render();
    return;
  }

  const hit = hitTest(sx, sy);

  if (hit && (hit.type === 'banner-drag' || hit.type === 'banner-rotate')) {
    dragTarget = hit;
    canvas.style.cursor = hit.type === 'banner-drag' ? 'grabbing' : 'alias';
    render();
    return;
  }

  if (hit && hit.type === 'banner') {
    selectedBannerId = hit.bannerId;
    selectedNodeIdx = -1;
    updateNodePanel();
    updateTooltipFields();
    renderBannerList();
    render();
    return;
  }

  if (hit && hit.type === 'waypoint') {
    dragTarget = hit;
    selectedNodeIdx = hit.nodeIdx;
    selectedBannerId = null;
    updateNodePanel();
    renderBannerList();
    render();
    return;
  }

  // Empty space: pan
  vp.dragging = true;
  vp.lastX = e.clientX;
  vp.lastY = e.clientY;
  canvas.style.cursor = 'grabbing';
  selectedNodeIdx = -1;
  selectedBannerId = null;
  updateNodePanel();
  renderBannerList();
  render();
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (vp.dragging) {
    const dx = e.clientX - vp.lastX;
    const dy = e.clientY - vp.lastY;
    vp.cx -= dx / vp.scale;
    vp.cz -= dy / vp.scale;
    vp.lastX = e.clientX;
    vp.lastY = e.clientY;
    render();
    return;
  }

  if (dragTarget && dragTarget.type === 'banner-drag') {
    const branch = branches[activeBranchIdx];
    if (!branch) return;
    const banner = banners.find(b => b.id === dragTarget.bannerId);
    if (!banner) return;

    const w = s2w(sx, sy);
    const closest = closestTOnPath(branch.waypoints, branch.isCyclic, w.x, w.z, 800);
    const pt = evalSpline(closest.t);
    if (!pt) return;

    const tLen = Math.sqrt(pt.tx * pt.tx + pt.tz * pt.tz) || 1;
    const nx = -pt.tz / tLen, nz = pt.tx / tLen;

    const dx = w.x - pt.x;
    const dz = w.z - pt.z;
    const projDist = dx * nx + dz * nz;

    banner.t = closest.t;
    banner.distanceFactor = projDist / DEFAULT_DISTANCE;

    updateTooltipFields();
    renderBannerList();
    render();
    return;
  }

  if (dragTarget && dragTarget.type === 'banner-rotate') {
    const branch = branches[activeBranchIdx];
    if (!branch) return;
    const banner = banners.find(b => b.id === dragTarget.bannerId);
    if (!banner) return;

    const geo = getBannerGeometry(banner, branch.waypoints, branch.isCyclic);
    if (!geo) return;

    const w = s2w(sx, sy);
    const toMouseX = w.x - geo.pivotX;
    const toMouseZ = w.z - geo.pivotZ;
    const mouseAngle = Math.atan2(toMouseZ, toMouseX);

    const baseAngle = Math.atan2(-geo.tx * geo.side, geo.tz * geo.side);
    let deltaAngle = mouseAngle - baseAngle;

    deltaAngle = ((deltaAngle + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;

    banner.angle = Math.round(deltaAngle * 180 / Math.PI * 10) / 10;

    updateTooltipFields();
    render();
    return;
  }

  if (dragTarget && dragTarget.type === 'waypoint') {
    const w = s2w(sx, sy);

    const branch = branches[activeBranchIdx];
    if (!branch) return;
    const wp = branch.waypoints[dragTarget.nodeIdx];
    wp.x = w.x;
    wp.z = w.z;

    splineCache = null;
    updateNodePanel();
    render();
    return;
  }

  // Hover cursor feedback
  if (!addingNode) {
    const hit = hitTest(sx, sy);
    if (hit?.type === 'banner-drag') canvas.style.cursor = 'grab';
    else if (hit?.type === 'banner-rotate') canvas.style.cursor = 'alias';
    else if (hit?.type === 'banner' || hit?.type === 'waypoint') canvas.style.cursor = 'pointer';
    else canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('mouseup', () => {
  if (vp.dragging) {
    vp.dragging = false;
  }
  dragTarget = null;
  canvas.style.cursor = addingNode ? 'crosshair' : 'crosshair';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;

  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const wBefore = s2w(sx, sy);

  vp.scale *= factor;
  vp.scale = Math.max(0.3, Math.min(30, vp.scale));

  const wAfter = s2w(sx, sy);
  vp.cx -= (wAfter.x - wBefore.x);
  vp.cz -= (wAfter.z - wBefore.z);

  render();
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodeIdx >= 0) {
    deleteSelectedNode();
  }
  if (e.key === 'Escape') {
    selectedBannerId = null;
    selectedNodeIdx = -1;
    updateNodePanel();
    renderBannerList();
    render();
  }
});

// ===========================================================================
// Waypoint Operations
// ===========================================================================
function insertWaypointNearCursor(wx, wz) {
  const branch = branches[activeBranchIdx];
  if (!branch || branch.waypoints.length < 2) {
    if (branch) {
      branch.waypoints.push({ x: wx, z: wz });
      splineCache = null;
      selectedNodeIdx = branch.waypoints.length - 1;
      updateNodePanel();
    }
    return;
  }

  const result = closestTOnPath(branch.waypoints, branch.isCyclic, wx, wz, 500);
  const segCount = branch.isCyclic ? branch.waypoints.length : branch.waypoints.length - 1;
  const seg = Math.min(Math.floor(result.t * segCount), segCount - 1);

  // Insert after the segment start
  const insertIdx = seg + 1;
  branch.waypoints.splice(insertIdx, 0, { x: wx, z: wz });
  splineCache = null;
  selectedNodeIdx = insertIdx;
  updateNodePanel();
}

function deleteSelectedNode() {
  const branch = branches[activeBranchIdx];
  if (!branch || selectedNodeIdx < 0) return;
  const minPoints = branch.isCyclic ? 3 : 2;
  if (branch.waypoints.length <= minPoints) return;
  branch.waypoints.splice(selectedNodeIdx, 1);
  selectedNodeIdx = -1;
  splineCache = null;
  updateNodePanel();
  render();
}

// ===========================================================================
// UI Panels
// ===========================================================================
function updateNodePanel() {
  const panel = document.getElementById('node-info');
  if (selectedNodeIdx < 0) { panel.classList.remove('active'); return; }

  panel.classList.add('active');
  const branch = branches[activeBranchIdx];
  const wp = branch?.waypoints[selectedNodeIdx];
  if (!wp) return;

  document.getElementById('node-px').value = wp.x.toFixed(1);
  document.getElementById('node-pz').value = wp.z.toFixed(1);

  // Show computed heading
  if (splineCache && splineCache.headings[selectedNodeIdx] !== undefined) {
    const deg = (splineCache.headings[selectedNodeIdx] * 180 / Math.PI).toFixed(1);
    document.getElementById('node-heading').textContent = `${deg}°`;
  } else {
    document.getElementById('node-heading').textContent = '--';
  }

  document.getElementById('node-curvature').textContent = '--';
}

for (const inputId of ['node-px', 'node-pz']) {
  document.getElementById(inputId).addEventListener('input', () => {
    if (selectedNodeIdx < 0) return;
    const branch = branches[activeBranchIdx];
    const wp = branch?.waypoints[selectedNodeIdx];
    if (!wp) return;
    wp.x = parseFloat(document.getElementById('node-px').value) || 0;
    wp.z = parseFloat(document.getElementById('node-pz').value) || 0;
    splineCache = null;
    render();
  });
}

function renderBannerList() {
  const list = document.getElementById('banner-list');
  const branch = branches[activeBranchIdx];
  if (!branch) { list.innerHTML = ''; return; }

  const branchBanners = banners.filter(b => b.branch_id === branch.id);
  branchBanners.sort((a, b) => a.t - b.t);

  list.innerHTML = branchBanners.map(b => `
    <div class="banner-item ${b.id === selectedBannerId ? 'selected' : ''}" data-id="${b.id}">
      <div class="banner-dot" style="background:${(b.distanceFactor ?? 1) >= 0 ? '#e06020' : '#2060e0'}"></div>
      <span class="banner-name">${b.id}</span>
      <span class="banner-t">t=${b.t.toFixed(3)}</span>
    </div>
  `).join('');

  for (const item of list.querySelectorAll('.banner-item')) {
    item.addEventListener('click', () => {
      selectedBannerId = item.dataset.id;
      selectedNodeIdx = -1;
      updateNodePanel();
      updateTooltipFields();
      renderBannerList();
      render();
    });
  }
}

// ===========================================================================
// Banner Tooltip
// ===========================================================================
function updateTooltipFields() {
  const tooltip = document.getElementById('banner-tooltip');
  if (!selectedBannerId) { tooltip.classList.remove('active'); return; }

  const banner = banners.find(b => b.id === selectedBannerId);
  if (!banner) { tooltip.classList.remove('active'); return; }

  document.getElementById('tt-title').textContent = banner.id;
  document.getElementById('tt-t').value = banner.t;
  document.getElementById('tt-mirror').checked = !!banner.mirror;
  document.getElementById('tt-angle').value = banner.angle || 0;
  document.getElementById('tt-size').value = banner.sizeFactor ?? 1;
  document.getElementById('tt-dist').value = banner.distanceFactor ?? 1;
  document.getElementById('tt-elev').value = banner.elevationFactor ?? 1;
  document.getElementById('tt-emissive').value = banner.emissiveFactor ?? 1;

  const previewEl = document.getElementById('tt-asset-preview');
  const nameEl = document.getElementById('tt-asset-name');
  const asset = banner.assetId ? assets.find(a => a.id === banner.assetId) : null;
  if (asset) {
    previewEl.innerHTML = `<img src="/assets/banners/${asset.filePath}" />`;
    nameEl.textContent = asset.name;
    nameEl.classList.remove('empty');
  } else {
    previewEl.innerHTML = '';
    nameEl.textContent = 'No asset';
    nameEl.classList.add('empty');
  }
}

function syncTooltipToState() {
  const banner = banners.find(b => b.id === selectedBannerId);
  if (!banner) return;
  banner.t = parseFloat(document.getElementById('tt-t').value) || 0;
  banner.mirror = document.getElementById('tt-mirror').checked;
  banner.angle = parseFloat(document.getElementById('tt-angle').value) || 0;
  banner.distanceFactor = parseFloat(document.getElementById('tt-dist').value) || 0;
  banner.sizeFactor = parseFloat(document.getElementById('tt-size').value) || 1;
  renderBannerList();
  render();
}
for (const id of ['tt-t', 'tt-angle', 'tt-dist', 'tt-size']) {
  document.getElementById(id).addEventListener('input', syncTooltipToState);
}
document.getElementById('tt-mirror').addEventListener('change', syncTooltipToState);

document.getElementById('tt-save').addEventListener('click', async () => {
  const banner = banners.find(b => b.id === selectedBannerId);
  if (!banner) return;

  banner.t = parseFloat(document.getElementById('tt-t').value) || 0;
  banner.mirror = document.getElementById('tt-mirror').checked;
  banner.angle = parseFloat(document.getElementById('tt-angle').value) || 0;
  banner.sizeFactor = parseFloat(document.getElementById('tt-size').value) || 1;
  banner.distanceFactor = parseFloat(document.getElementById('tt-dist').value) || 0;
  banner.elevationFactor = parseFloat(document.getElementById('tt-elev').value) || 1;
  banner.emissiveFactor = parseFloat(document.getElementById('tt-emissive').value) || 1;

  await API.updateBanner(banner.id, banner);
  renderBannerList();
  render();
  document.getElementById('status').textContent = 'Banner saved!';
  setTimeout(() => { document.getElementById('status').textContent = 'Ready'; }, 1500);
});

document.getElementById('tt-delete').addEventListener('click', async () => {
  if (!selectedBannerId) return;
  if (!confirm(`Delete banner "${selectedBannerId}"?`)) return;

  await API.deleteBanner(selectedBannerId);
  banners = banners.filter(b => b.id !== selectedBannerId);
  selectedBannerId = null;
  renderBannerList();
  render();
});

// ===========================================================================
// Toolbar Actions
// ===========================================================================
document.getElementById('btn-save').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.textContent = 'Saving...';
  try {
    for (const branch of branches) {
      await API.updateBranch(branch.id, {
        waypoints: branch.waypoints,
        isCyclic: branch.isCyclic,
      });
    }
    for (const banner of banners) {
      await API.updateBanner(banner.id, banner);
    }
    status.textContent = 'Saved!';
    setTimeout(() => { status.textContent = 'Ready'; }, 2000);
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    console.error(err);
  }
});

document.getElementById('btn-add-node').addEventListener('click', () => {
  addingNode = !addingNode;
  document.getElementById('btn-add-node').textContent = addingNode ? 'Click curve...' : '+ Waypoint';
  canvas.style.cursor = addingNode ? 'copy' : 'crosshair';
});

document.getElementById('btn-delete-node').addEventListener('click', () => {
  deleteSelectedNode();
});

document.getElementById('btn-fit').addEventListener('click', () => {
  fitView();
});

document.getElementById('btn-add-banner').addEventListener('click', () => {
  const branch = branches[activeBranchIdx];
  if (!branch) return;
  const id = `banner_${branch.id}_${Date.now()}`;
  const newBanner = {
    id,
    branch_id: branch.id,
    t: 0.5,
    angle: 0,
    sizeFactor: 1.0,
    distanceFactor: 0.1,
    elevationFactor: 1.0,
    emissiveFactor: 1.0,
    assetId: null,
    mirror: false,
  };
  banners.push(newBanner);
  selectedBannerId = id;
  selectedNodeIdx = -1;
  updateNodePanel();
  updateTooltipFields();
  renderBannerList();
  render();
  API.createBanner(newBanner).catch(console.error);
});

document.getElementById('chk-cyclic').addEventListener('change', (e) => {
  const branch = branches[activeBranchIdx];
  if (!branch) return;
  branch.isCyclic = e.target.checked;
  splineCache = null;
  render();
});

// ===========================================================================
// Fit View
// ===========================================================================
function fitView() {
  const branch = branches[activeBranchIdx];
  if (!branch || !branch.waypoints || !branch.waypoints.length) return;

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const wp of branch.waypoints) {
    minX = Math.min(minX, wp.x);
    maxX = Math.max(maxX, wp.x);
    minZ = Math.min(minZ, wp.z);
    maxZ = Math.max(maxZ, wp.z);
  }

  const pad = 40;
  vp.cx = (minX + maxX) / 2;
  vp.cz = (minZ + maxZ) / 2;

  const cw = canvas.width / devicePixelRatio;
  const ch = canvas.height / devicePixelRatio;
  const scaleX = (cw - pad * 2) / (maxX - minX || 1);
  const scaleZ = (ch - pad * 2) / (maxZ - minZ || 1);
  vp.scale = Math.min(scaleX, scaleZ);

  render();
}

// ===========================================================================
// Asset Library
// ===========================================================================
function renderAssetGrid() {
  const grid = document.getElementById('asset-grid');
  grid.innerHTML = assets.map(a => `
    <div class="asset-thumb ${pickingAssetForBanner && a.id === pickingAssetForBanner ? 'selected' : ''}" data-id="${a.id}">
      <img src="/assets/banners/${a.filePath}" alt="${a.name}" />
      <span class="asset-label">${a.name}</span>
      <button class="asset-del" data-id="${a.id}" title="Delete asset">&times;</button>
    </div>
  `).join('');

  for (const thumb of grid.querySelectorAll('.asset-thumb')) {
    thumb.addEventListener('click', (e) => {
      if (e.target.classList.contains('asset-del')) return;
      const assetId = thumb.dataset.id;
      if (pickingAssetForBanner) {
        const banner = banners.find(b => b.id === pickingAssetForBanner);
        if (banner) {
          banner.assetId = assetId;
          API.updateBanner(banner.id, { assetId }).catch(console.error);
          updateTooltipFields();
          renderBannerList();
          render();
        }
        pickingAssetForBanner = null;
        renderAssetGrid();
        return;
      }
    });
  }

  for (const btn of grid.querySelectorAll('.asset-del')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const asset = assets.find(a => a.id === id);
      if (!asset || !confirm(`Delete asset "${asset.name}"?`)) return;
      await API.deleteAsset(id);
      assets = assets.filter(a => a.id !== id);
      for (const b of banners) {
        if (b.assetId === id) b.assetId = null;
      }
      updateTooltipFields();
      renderAssetGrid();
      renderBannerList();
      render();
    });
  }
}

document.getElementById('asset-upload-btn').addEventListener('click', () => {
  document.getElementById('asset-upload-input').click();
});

document.getElementById('asset-upload-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('status');
  status.textContent = 'Uploading...';
  try {
    const newAsset = await API.uploadAsset(file);
    assets.unshift(newAsset);
    renderAssetGrid();
    status.textContent = 'Uploaded!';
    setTimeout(() => { status.textContent = 'Ready'; }, 1500);
  } catch (err) {
    status.textContent = `Upload error: ${err.message}`;
    console.error(err);
  }
  e.target.value = '';
});

document.getElementById('tt-asset-pick').addEventListener('click', () => {
  if (!selectedBannerId) return;
  pickingAssetForBanner = selectedBannerId;
  renderAssetGrid();
  document.getElementById('asset-grid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

document.getElementById('tt-asset-clear').addEventListener('click', () => {
  const banner = banners.find(b => b.id === selectedBannerId);
  if (!banner) return;
  banner.assetId = null;
  API.updateBanner(banner.id, { assetId: null }).catch(console.error);
  updateTooltipFields();
  renderBannerList();
  render();
});

// ===========================================================================
// Init
// ===========================================================================
async function init() {
  try {
    branches = await API.getBranches();
    banners = await API.getBanners();
    assets = await API.getAssets();

    // Sync cyclic checkbox
    const branch = branches[activeBranchIdx];
    if (branch) {
      document.getElementById('chk-cyclic').checked = !!branch.isCyclic;
    }

    document.getElementById('status').textContent = 'Ready';
    resizeCanvas();
    fitView();
    renderBannerList();
    renderAssetGrid();
  } catch (err) {
    document.getElementById('status').textContent = `Failed to load: ${err.message}`;
    console.error(err);
  }
}

init();
</script>
